<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cifrado Cesar y Atbash</title>

<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="main">

    <div class="container">

        <h2>Cifrado César / Atbash</h2>

        <textarea id="texto" placeholder="Escribe el texto"></textarea>

        <select id="modo">
            <option value="cesar">Cifrado César</option>
            <option value="atbash">Atbash</option>
        </select>

        <div id="cesar_desp">
            <input type="number" id="desp" placeholder="Desplazamiento" value="3">
        </div>

        <input
            type="text"
            id="alfabeto"
            value="abcdefghijklmnopqrstuvwxyz"
            placeholder="Alfabeto"
        >

        <div style="display:flex; justify-content:space-between;">
            <button onclick="cifrar()">Cifrar</button>
            <button onclick="descifrar()">Descifrar</button>
        </div>

        <div id="resultado"></div>

    </div>


    <div class="container">

    <h2>Análisis de frecuencia</h2>

    <button onclick="analizarFrecuencia()">
        Aplicar análisis
    </button>

    <div class="tabs">

        <button onclick="ordenarPorDesp()">
            Ordenar por desp
        </button>

        <button onclick="ordenarPorScore()">
            Ordenar por score
        </button>

    </div>

    <h3>Posibles soluciones</h3>

    <ul id="listaSoluciones">
    </ul>

    <h3>Mejor solución</h3>

    <div id="mejorSolucion"></div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
